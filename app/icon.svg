<svg viewBox="0 0 200 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Background background to look sharp on browser tabs -->
  <rect width="100%" height="100%" fill="#030407"/>
  
  <!-- Outer Hexagon -->
  <path
    d="M 100 15 
       L 178 60 
       L 178 150 
       L 100 195 
       L 22 150 
       L 22 105"
    stroke="#818cf8"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- Top-Left part of Hexagon that continues into top of Z -->
  <path
    d="M 100 15 
       L 22 60 
       L 22 75 
       L 90 75"
    stroke="#818cf8"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Central Backbone string -->
  <path
    d="M 100 15 L 100 195"
    stroke="#818cf8"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- The rest of 'Z' -->
  <path
    d="M 90 75 L 22 143 L 95 143"
    stroke="#c084fc"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- '4' triangle leg and crossbar -->
  <path
    d="M 100 75 L 65 125 L 125 125"
    stroke="#22d3ee"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- 'X' diagonals -->
  <path
    d="M 120 75 L 178 150"
    stroke="#818cf8"
    stroke-width="11"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <path
    d="M 120 150 L 178 75"
    stroke="#818cf8"
    stroke-width="11"
    stroke-[#818cf8]"
    stroke-width-linecap="round"
    stroke-linejoin="round"
  />
</svg>
